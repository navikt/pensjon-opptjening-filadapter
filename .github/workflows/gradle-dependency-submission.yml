name: Monitor dependencies with Dependabot
on:
  workflow_dispatch:
  schedule:
    - cron: '25 8,13 * * 1,2,3,4,5'
    - cron: '25 13 * * 0,6'
  push:
    branches:
      - main
    paths:
      - "**.gradle.kts"
      - "gradle.properties"
jobs:
  dependabot:
    name: 'Monitor dependencies with Dependabot'
    runs-on: ubuntu-latest
    permissions: # The Dependency Submission API requires write permission
      contents: write
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v6

      - name: 'Setup Java'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'gradle'

      - name: 'Generate and submit dependency graph'
        uses: gradle/actions/dependency-submission@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
        with:
          dependency-graph-include-configurations: '^runtimeClasspath$'
